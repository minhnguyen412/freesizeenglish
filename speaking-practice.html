<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FREESIZE ENGLISH — Study Session</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black:       #1a1a1a;
    --red:         #e63030;
    --red-dark:    #b71c1c;
    --red-light:   #ffd5d5;
    --red-pale:    #fff5f5;
    --cream:       #fffef5;
    --white:       #ffffff;
    --yellow:      #ffd84d;
    --yellow-pale: #fffbe6;
    --sky:         #72c8f0;
    --sky-pale:    #eaf8ff;
    --green:       #4caf50;
    --green-pale:  #f0fff0;
    --green-dark:  #2e7d32;
    --orange-pale: #feefdb;
    --muted:       #888;
    --border:      2.5px solid var(--black);
    --border-thick:3px solid var(--black);
    --shadow-sm:   3px 3px 0 var(--black);
    --shadow-md:   4px 4px 0 var(--black);
    --shadow-lg:   6px 6px 0 var(--black);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Fredoka', sans-serif;
    font-weight: 500;
    background: var(--cream);
    color: var(--black);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 22px 22px;
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    background: var(--red);
    border-bottom: var(--border-thick);
    padding: 0 50px; height: 66px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-weight: 700; font-size: 1.65rem; color: white;
    letter-spacing: 0.05em; text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
    text-decoration: none;
  }
  .header-tag {
    background: var(--white); border: var(--border); border-radius: 50px;
    padding: 5px 18px; font-weight: 700; font-size: 0.88rem;
    box-shadow: var(--shadow-sm);
  }

  /* ── PAGE WRAPPER ── */
  #app { position: relative; z-index: 1; }

  /* ── MAIN GRID ── */
  .page-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 26px;
    padding: 36px 56px 100px;
    max-width: 1300px;
    margin: 0 auto;
    align-items: start;
  }

  /* ── VIDEO COLUMN (sticky) ── */
  .video-col {
    position: sticky;
    top: 88px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .video-card {
    background: var(--black);
    border: var(--border-thick);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    aspect-ratio: 9 / 16;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .video-card iframe {
    width: 100%; height: 100%;
    border: none; display: block;
  }

  .video-placeholder {
    background: var(--white);
    border: var(--border-thick);
    border-radius: 20px;
    box-shadow: var(--shadow-md);
    aspect-ratio: 9 / 16;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    text-align: center;
    padding: 24px;
  }
  .video-placeholder .big-emoji { font-size: 3.5rem; }

  .video-link-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--red-light); border: var(--border); border-radius: 50px;
    padding: 10px 20px; font-weight: 700; font-size: 0.9rem;
    box-shadow: var(--shadow-sm); text-decoration: none; color: var(--black);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .video-link-btn:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-md); }

  .video-meta-card {
    background: var(--red);
    border: var(--border-thick); border-radius: 16px;
    box-shadow: var(--shadow-md);
    padding: 14px 16px;
    color: white;
    text-align: center;
  }
  .video-meta-card .session-id {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700; font-size: 0.8rem;
    background: rgba(255,255,255,0.18); border-radius: 8px;
    padding: 5px 10px; word-break: break-all; margin-bottom: 10px;
  }
  .stat-row { display: flex; gap: 8px; }
  .stat-box {
    flex: 1; background: rgba(255,255,255,0.18); border-radius: 10px;
    padding: 8px 6px; text-align: center;
    border: 1.5px solid rgba(255,255,255,0.25);
  }
  .stat-box .num { font-size: 1.3rem; font-weight: 700; }
  .stat-box .lbl { font-size: 0.68rem; opacity: 0.82; }

  .tiktok-iframe-wrap {
    width: 100%; aspect-ratio: 9/16;
    border: var(--border-thick); border-radius: 20px;
    overflow: hidden; box-shadow: var(--shadow-lg);
    background: #111;
  }
  .tiktok-iframe-wrap iframe {
    width: 100%; height: 100%;
    border: none; display: block;
  }
  .tiktok-open-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--black); color: white;
    border: var(--border-thick); border-radius: 50px;
    padding: 11px 22px; font-weight: 700; font-size: 0.92rem;
    box-shadow: var(--shadow-md); text-decoration: none;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .tiktok-open-btn:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-lg); color: white; }

  /* ── CONTENT COLUMN ── */
  .content-col {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--white);
    border: var(--border-thick); border-radius: 22px;
    box-shadow: var(--shadow-md); padding: 24px;
    animation: fadeUp 0.38s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-title {
    display: inline-block;
    font-weight: 700; font-size: 0.95rem;
    background: var(--red); color: white;
    border: var(--border); border-radius: 50px;
    padding: 5px 20px; box-shadow: var(--shadow-sm);
    margin-bottom: 16px;
  }
  .card-title.yellow { background: var(--yellow); color: var(--black); }
  .card-title.sky    { background: var(--sky);    color: var(--black); }
  .card-title.green  { background: var(--green);  color: white; }

  .date-pill {
    font-family: 'Quicksand', sans-serif;
    font-size: 0.75rem; font-weight: 700;
    background: var(--yellow-pale); border: var(--border); border-radius: 50px;
    padding: 3px 12px; box-shadow: var(--shadow-sm);
    display: inline-block; margin-bottom: 16px; margin-left: 8px;
  }

  /* ── TRANSCRIPT ── */
  .transcript-body {
    font-family: 'Quicksand', sans-serif;
    font-size: 1rem; font-weight: 600; line-height: 1.85; color: #333;
    background: var(--red-pale); border: var(--border);
    border-radius: 14px; padding: 16px 18px;
    max-height: 260px; overflow-y: auto;
    white-space: pre-wrap;
  }
  .transcript-body::-webkit-scrollbar { width: 5px; }
  .transcript-body::-webkit-scrollbar-thumb { background: var(--red-light); border-radius: 3px; }

  /* ── VOCAB / GRAMMAR PILLS ── */
  .pill-wrap { display: flex; flex-wrap: wrap; gap: 10px; }
  .vocab-pill {
    font-family: 'Quicksand', sans-serif;
    font-size: 0.92rem; font-weight: 700;
    border: var(--border); border-radius: 50px;
    padding: 7px 16px; box-shadow: var(--shadow-sm);
    transition: transform 0.12s, box-shadow 0.12s;
    animation: fadeUp 0.35s ease both;
    cursor: default;
  }
  .vocab-pill:nth-child(4n+1) { background: var(--yellow-pale); }
  .vocab-pill:nth-child(4n+2) { background: var(--red-pale); }
  .vocab-pill:nth-child(4n+3) { background: var(--sky-pale); }
  .vocab-pill:nth-child(4n+4) { background: var(--green-pale); }
  .vocab-pill:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-md); }

  .grammar-item {
    font-family: 'Quicksand', sans-serif;
    font-size: 0.95rem; font-weight: 600; line-height: 1.6;
    background: var(--sky-pale); border: var(--border);
    border-radius: 14px; padding: 11px 16px; box-shadow: var(--shadow-sm);
    transition: transform 0.12s, box-shadow 0.12s;
    animation: fadeUp 0.35s ease both;
  }
  .grammar-item:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-md); }
  .grammar-list { display: flex; flex-direction: column; gap: 8px; }

  /* ── RECORDINGS (saved from JSON) ── */
  .saved-recordings-list { display: flex; flex-direction: column; gap: 12px; }
  .rec-item {
    background: var(--red-pale); border: var(--border);
    border-radius: 16px; padding: 14px 16px;
    box-shadow: var(--shadow-sm); animation: fadeUp 0.35s ease both;
  }
  .rec-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .rec-badge {
    background: var(--red); color: white;
    border: var(--border); border-radius: 50px;
    padding: 3px 14px; font-weight: 700; font-size: 0.8rem;
    box-shadow: var(--shadow-sm);
  }
  .rec-ts { font-family: 'Quicksand', sans-serif; font-size: 0.73rem; color: var(--muted); font-weight: 600; }
  .rec-item audio {
    width: 100%; height: 36px; display: block;
    border-radius: 8px; border: var(--border); margin-bottom: 6px;
  }
  .rec-stt {
    font-family: 'Quicksand', sans-serif;
    font-size: 0.88rem; font-weight: 600; color: #444;
    background: var(--white); border: var(--border);
    border-radius: 10px; padding: 9px 13px; line-height: 1.6;
  }
  .rec-stt::before { content: '💬 '; }

  /* ── LIVE RECORDER SECTION ── */
  .recorder-section {
    margin-top: 20px;
    border-top: var(--border);
    padding-top: 20px;
  }
  .recorder-section-title {
    font-weight: 700; font-size: 0.95rem;
    background: var(--green); color: white;
    border: var(--border); border-radius: 50px;
    padding: 5px 20px; box-shadow: var(--shadow-sm);
    display: inline-block; margin-bottom: 16px;
  }

  /* Lang select row */
  .lang-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .lang-row select {
    font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 0.88rem;
    background: var(--white); border: var(--border); border-radius: 10px;
    padding: 7px 12px; outline: none; cursor: pointer;
    transition: box-shadow 0.15s;
  }
  .lang-row select:focus { box-shadow: var(--shadow-sm); }

  /* Recorder inner */
  .recorder-inner {
    background: var(--red-pale); border: var(--border); border-radius: 14px;
    padding: 16px 18px; margin-bottom: 14px;
    width: 100%; max-width: 100%; box-sizing: border-box; overflow: hidden;
  }
  .rec-controls {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap;
  }
  .rec-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--muted); border: var(--border); flex-shrink: 0;
    transition: background 0.3s;
  }
  .rec-dot.active {
    background: var(--red);
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .rec-timer {
    font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.1rem;
    min-width: 50px; color: var(--black);
  }

  /* Buttons */
  .btn {
    font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 0.95rem;
    padding: 9px 20px; border: var(--border-thick); border-radius: 50px;
    box-shadow: var(--shadow-sm); cursor: pointer;
    display: inline-flex; align-items: center; gap: 7px;
    transition: transform 0.12s, box-shadow 0.12s;
    white-space: nowrap; background: var(--white); color: var(--black);
  }
  .btn:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-md); }
  .btn:active { transform: translate(1px,1px); box-shadow: none; }
  .btn:disabled { opacity: 0.4; pointer-events: none; }
  .btn-red    { background: var(--red);    color: white; }
  .btn-green  { background: var(--green);  color: white; }
  .btn-white  { background: var(--white);  color: var(--black); }
  .btn-sky    { background: var(--sky-pale); color: var(--black); }

  /* STT output */
  .stt-box {
    font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 0.9rem;
    line-height: 1.7; color: var(--muted);
    background: var(--white); border: var(--border); border-radius: 10px;
    padding: 11px 14px; min-height: 52px;
    white-space: pre-wrap; word-break: break-word;
    overflow-wrap: break-word; overflow: hidden;
    width: 100%; max-width: 100%; box-sizing: border-box;
  }
  .stt-box.has-text { color: var(--black); }

  /* Live recordings list */
  .live-recordings-list { display: flex; flex-direction: column; gap: 10px; }

  .live-rec-item {
    background: var(--white); border: var(--border); border-radius: 14px;
    padding: 12px 14px; display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow-sm);
    animation: fadeUp 0.3s ease both;
  }
  .live-rec-num {
    background: var(--green); color: white;
    border: var(--border); border-radius: 50px;
    padding: 2px 12px; font-weight: 700; font-size: 0.78rem;
    flex-shrink: 0;
  }
  .live-rec-item audio {
    flex: 1; height: 32px;
    border-radius: 8px; min-width: 0;
    border: var(--border);
  }
  .live-rec-stt {
    font-family: 'Quicksand', sans-serif; font-size: 0.75rem; font-weight: 600;
    color: var(--muted); max-width: 140px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex-shrink: 1;
  }
  .live-rec-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .btn-icon {
    width: 32px; height: 32px; border-radius: 50%;
    border: var(--border); background: var(--white);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 0.88rem;
    box-shadow: var(--shadow-sm); transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-icon:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow-md); }
  .btn-icon.del { background: var(--red-pale); }
  .btn-icon.dl  { background: var(--green-pale); }

  /* Status msg */
  .status-msg {
    font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 0.82rem;
    padding: 8px 14px; border-radius: 10px; margin-top: 10px;
    border: var(--border); display: none;
  }
  .status-msg.show { display: block; }
  .status-msg.info    { background: var(--yellow-pale); color: #7a5c00; }
  .status-msg.success { background: var(--green-pale);  color: var(--green-dark); }
  .status-msg.error   { background: var(--red-pale);    color: var(--red-dark); }

  /* Divider label */
  .divider-label {
    display: flex; align-items: center; gap: 10px;
    margin: 18px 0 14px;
    font-family: 'Quicksand', sans-serif; font-weight: 700;
    font-size: 0.78rem; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--muted);
  }
  .divider-label::before, .divider-label::after {
    content: ''; flex: 1; height: 2px;
    background: var(--black); opacity: 0.12;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 28px 20px;
    color: var(--muted); font-size: 0.95rem;
    font-family: 'Quicksand', sans-serif; font-weight: 600;
  }
  .empty-state .emoji { font-size: 2.2rem; display: block; margin-bottom: 8px; }

  /* ── ERROR / LOADER / LIST PAGE ── */
  .center-wrap {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 60vh; gap: 18px;
    position: relative; z-index: 1; padding: 40px;
  }
  .loader-spinner {
    width: 52px; height: 52px; border-radius: 50%;
    border: 4px solid var(--red-light); border-top-color: var(--red);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 1.05rem; font-weight: 700; color: var(--red); }

  .error-card {
    background: var(--red-light); border: var(--border-thick);
    border-radius: 22px; box-shadow: var(--shadow-lg);
    padding: 44px 36px; text-align: center; max-width: 500px;
  }
  .error-card .emoji { font-size: 2.8rem; margin-bottom: 12px; }
  .error-card h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
  .error-card p { font-family: 'Quicksand', sans-serif; color: #555; font-size: 0.95rem; line-height: 1.65; }
  .error-card code {
    background: var(--white); border: var(--border);
    border-radius: 6px; padding: 1px 8px; font-size: 0.88rem; margin: 2px;
    display: inline-block;
  }

  /* ── SESSION LIST ── */
  .session-list { width: 100%; max-width: 680px; }
  .session-list h2 {
    font-size: 1.4rem; font-weight: 700; margin-bottom: 20px;
    display: inline-block;
    background: var(--yellow); border: var(--border-thick); border-radius: 50px;
    padding: 8px 26px; box-shadow: var(--shadow-md);
  }
  .session-list-items { display: flex; flex-direction: column; gap: 12px; }
  .session-list-item {
    background: var(--white); border: var(--border-thick); border-radius: 16px;
    box-shadow: var(--shadow-sm); padding: 16px 20px;
    display: flex; justify-content: space-between; align-items: center; gap: 16px;
    text-decoration: none; color: var(--black);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .session-list-item:hover { transform: translate(-3px,-3px); box-shadow: var(--shadow-lg); }
  .session-list-item .sli-id {
    font-weight: 700; font-size: 1rem;
    background: var(--red-light); border: var(--border); border-radius: 50px;
    padding: 3px 14px; box-shadow: var(--shadow-sm);
  }
  .session-list-item .sli-date {
    font-family: 'Quicksand', sans-serif; font-size: 0.78rem; font-weight: 600; color: var(--muted);
  }
  .session-list-item .sli-arrow { font-size: 1.2rem; color: var(--red); flex-shrink: 0; }

  /* ── FOOTER ── */
  footer {
    background: var(--black); color: rgba(255,255,255,0.6);
    padding: 28px 50px; text-align: center; position: relative; z-index: 1;
  }
  footer .brand { font-weight: 700; color: var(--red-light); font-size: 1.2rem; margin-bottom: 4px; }
  footer p { font-size: 0.9rem; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .page-grid { grid-template-columns: 1fr; padding: 20px 20px 80px; }
    .video-col { position: static; }
    .video-card, .video-placeholder { max-width: 320px; margin: 0 auto; }
    .video-col.tiktok-col { display: none; }
  }
  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .video-card, .video-placeholder { max-width: 100%; }
    .card { padding: 16px; }
    .page-grid { padding: 14px 14px 60px; gap: 16px; }
    .live-rec-item { flex-wrap: wrap; }
    .live-rec-item audio { min-width: 0; width: 100%; flex: none; order: 2; }
    .live-rec-num { order: 1; }
    .live-rec-stt { order: 3; max-width: 100%; white-space: normal; }
    .live-rec-actions { order: 4; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">🔴 FREESIZE ENGLISH</a>
  <div class="header-tag">Study Session</div>
</header>

<div id="app"></div>

<footer>
  <p class="brand">FREESIZE ENGLISH</p>
  <p>Your personal English study archive</p>
</footer>

<script>
// ── UTILS ──────────────────────────────────────────────────────────────────
function getParam(k) { return new URLSearchParams(window.location.search).get(k); }

function fmtDate(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleString('vi-VN', {
      day:'2-digit', month:'2-digit', year:'numeric',
      hour:'2-digit', minute:'2-digit'
    });
  } catch { return iso; }
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function extractTikTokId(url) {
  const m = url.match(/\/video\/(\d+)/);
  return m ? m[1] : null;
}

// ── NORMALISE JSON ─────────────────────────────────────────────────────────
function normalise(raw) {
  const d = { ...raw };

  if (typeof d.recordings === 'string') {
    const urls = d.recordings.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
    d.recordings = urls.map((url, i) => ({ index: i+1, url, sttText: '', timestamp: d.createdAt||null }));
  } else if (Array.isArray(d.recordings)) {
    d.recordings = d.recordings.map((r, i) => ({
      index:     r.index || i+1,
      url:       r.url || r.audioFile || null,
      sttText:   r.sttText || '',
      timestamp: r.timestamp || d.createdAt || null,
    }));
  } else {
    d.recordings = [];
  }

  d._vocab = typeof d.vocabulary === 'string'
    ? d.vocabulary.split(/[,\n]+/).map(s=>s.trim()).filter(Boolean)
    : [];

  d._grammar = typeof d.grammarStructures === 'string'
    ? d.grammarStructures.split(/[;\n]+/).map(s=>s.trim()).filter(Boolean)
    : [];

  return d;
}

// ── BUILD VIDEO EMBED ──────────────────────────────────────────────────────
function buildVideo(url) {
  if (!url || !url.trim()) return null;

  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?]+)/);
  if (yt) {
    return { type: 'youtube', iframe: `https://www.youtube.com/embed/${yt[1]}?rel=0`, link: url, label: '↗ Open on YouTube' };
  }

  if (url.includes('tiktok.com')) {
    return { type: 'tiktok', vid: extractTikTokId(url), link: url, label: '↗ Watch on TikTok' };
  }

  return { type: 'generic', iframe: url, link: url, label: '↗ Open link' };
}

function buildVideoColHTML(vid) {
  if (!vid) {
    return `<div class="video-placeholder"><span class="big-emoji">🎬</span><span>No video URL</span></div>`;
  }
  if (vid.type === 'youtube') {
    return `
      <div class="video-card">
        <iframe src="${esc(vid.iframe)}" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen loading="lazy"></iframe>
      </div>
      <a class="video-link-btn" href="${esc(vid.link)}" target="_blank" rel="noopener">${esc(vid.label)}</a>`;
  }
  if (vid.type === 'tiktok') {
    if (!vid.vid) {
      return `<div class="video-placeholder"><span class="big-emoji">🎵</span><span>Can't extract TikTok ID</span><a class="tiktok-open-btn" href="${esc(vid.link)}" target="_blank" rel="noopener" style="margin-top:12px;">↗ Open on TikTok</a></div>`;
    }
    return `
      <div class="tiktok-iframe-wrap">
        <iframe src="https://www.tiktok.com/embed/v2/${vid.vid}?autoplay=1" allow="autoplay; encrypted-media; fullscreen" allowfullscreen loading="lazy" scrolling="no"></iframe>
      </div>
      <a class="tiktok-open-btn" href="${esc(vid.link)}" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/></svg>
        Watch on TikTok
      </a>`;
  }
  return `<div class="video-card"><iframe src="${esc(vid.iframe)}" allowfullscreen loading="lazy"></iframe></div><a class="video-link-btn" href="${esc(vid.link)}" target="_blank" rel="noopener">${esc(vid.label)}</a>`;
}

// ── LIVE RECORDER STATE ────────────────────────────────────────────────────
let liveRecordings = [];
let mediaRec       = null;
let audioChunks    = [];
let isRecording    = false;
let timerInt       = null;
let recSecs        = 0;
let speechRec      = null;
let currentSTT     = '';

function showRecStatus(msg, type) {
  const el = document.getElementById('liveRecStatus');
  if (!el) return;
  el.textContent = msg;
  el.className = `status-msg show ${type}`;
  if (type !== 'info') setTimeout(() => el.classList.remove('show'), 5000);
}

async function toggleRecording() {
  isRecording ? stopRecording() : await startRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = getSupportedMimeType();
    mediaRec    = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
    audioChunks = [];
    currentSTT  = '';

    mediaRec.ondataavailable = e => audioChunks.push(e.data);
    mediaRec.onstop = saveLiveRecording;
    mediaRec.start();
    isRecording = true;

    document.getElementById('liveRecDot').classList.add('active');
    document.getElementById('liveRecBtn').textContent  = '⏸ Pause';
    document.getElementById('liveStopBtn').disabled    = false;

    recSecs  = 0;
    timerInt = setInterval(() => {
      recSecs++;
      const m = String(Math.floor(recSecs/60)).padStart(2,'0');
      const s = String(recSecs%60).padStart(2,'0');
      document.getElementById('liveRecTimer').textContent = `${m}:${s}`;
    }, 1000);

    startSTT();
    showRecStatus('Recording... speak clearly 🎙️', 'info');
  } catch(e) {
    showRecStatus('Microphone denied: ' + e.message, 'error');
  }
}

function stopRecording() {
  if (!mediaRec) return;
  mediaRec.stop();
  mediaRec.stream.getTracks().forEach(t => t.stop());
  isRecording = false;
  clearInterval(timerInt);
  document.getElementById('liveRecDot').classList.remove('active');
  document.getElementById('liveRecBtn').textContent = '● REC';
  document.getElementById('liveStopBtn').disabled   = true;
  if (speechRec) { speechRec.stop(); speechRec = null; }
}

function getSupportedMimeType() {
  const types = [
    'audio/mp4',           // iOS Safari, macOS Safari
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/ogg;codecs=opus',
    'audio/ogg',
  ];
  for (const t of types) {
    if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

function saveLiveRecording() {
  const mimeType = getSupportedMimeType();
  const blob  = new Blob(audioChunks, mimeType ? { type: mimeType } : {});
  const url   = URL.createObjectURL(blob);
  const ext   = mimeType.includes('mp4') ? 'mp4' : mimeType.includes('ogg') ? 'ogg' : 'webm';
  const idx   = liveRecordings.length + 1;
  liveRecordings.push({ index: idx, blob, url, ext, sttText: currentSTT.trim(), timestamp: new Date().toISOString() });
  renderLiveRecordings();
  showRecStatus(`✓ Recording #${idx} saved`, 'success');
}

function renderLiveRecordings() {
  const list = document.getElementById('liveRecordingsList');
  if (!list) return;
  if (liveRecordings.length === 0) {
    list.innerHTML = '<div style="font-family:Quicksand,sans-serif;font-size:0.85rem;color:var(--muted);padding:4px 0;">No recordings yet — hit REC to start!</div>';
    return;
  }
  list.innerHTML = '';
  liveRecordings.forEach((rec, i) => {
    const div = document.createElement('div');
    div.className = 'live-rec-item';
    div.innerHTML = `
      <span class="live-rec-num">REC ${rec.index}</span>
      <audio controls src="${rec.url}"></audio>
      ${rec.sttText ? `<span class="live-rec-stt" title="${esc(rec.sttText)}">${esc(rec.sttText)}</span>` : ''}
      <div class="live-rec-actions">
        <button class="btn-icon dl" title="Download audio" onclick="downloadLiveRec(${i})">⬇</button>
        <button class="btn-icon del" title="Delete" onclick="deleteLiveRec(${i})">✕</button>
      </div>`;
    list.appendChild(div);
  });
}

function downloadLiveRec(i) {
  const rec = liveRecordings[i];
  const a   = document.createElement('a');
  a.href     = rec.url;
  a.download = `practice_rec_${rec.index}_${Date.now()}.${rec.ext || 'webm'}`;
  a.click();
}

function deleteLiveRec(i) {
  liveRecordings.splice(i, 1);
  liveRecordings.forEach((r, idx) => { r.index = idx + 1; });
  renderLiveRecordings();
}

// ── SPEECH TO TEXT ─────────────────────────────────────────────────────────
function startSTT() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const el = document.getElementById('liveSttOutput');
  if (!SR) {
    if (el) { el.textContent = 'STT not supported — use Chrome.'; el.classList.add('has-text'); }
    return;
  }

  speechRec = new SR();
  speechRec.continuous     = true;
  speechRec.interimResults = true;
  speechRec.lang           = document.getElementById('liveSttLang')?.value || 'en-US';

  let finalText = '';

  speechRec.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      e.results[i].isFinal
        ? (finalText += e.results[i][0].transcript + ' ')
        : (interim  += e.results[i][0].transcript);
    }
    currentSTT = finalText + interim;
    if (el) {
      el.className   = 'stt-box has-text';
      el.textContent = currentSTT || '...listening';
    }
  };

  speechRec.onerror = e => {
    if (e.error !== 'no-speech' && el) el.textContent = 'STT error: ' + e.error;
  };
  speechRec.onend = () => { if (isRecording) { try { speechRec.start(); } catch(e){} } };
  speechRec.start();
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderPage(raw) {
  const d = normalise(raw);
  const vid = buildVideo(d.videoUrl);

  const recCount = d.recordings.length;
  const vocCount = d._vocab.length;
  const graCount = d._grammar.length;

  document.title = `${d.id || 'Session'} — Freesize English`;

  /* ---- VIDEO COLUMN ---- */
  const videoColHTML = buildVideoColHTML(vid) + `
    <div class="video-meta-card">
      <div class="session-id">${esc(d.id || '—')}</div>
      <div class="stat-row">
        <div class="stat-box"><div class="num">${vocCount}</div><div class="lbl">Vocab</div></div>
        <div class="stat-box"><div class="num">${graCount}</div><div class="lbl">Grammar</div></div>
      </div>
    </div>`;

  /* ---- Transcript ---- */
  const transcriptHTML = d.transcript && d.transcript.trim()
    ? `<div class="transcript-body">${esc(d.transcript)}</div>`
    : `<div class="empty-state"><span class="emoji">📭</span>No transcript saved.</div>`;

  /* ---- Vocab ---- */
  const vocabHTML = vocCount
    ? d._vocab.map((v, i) => `<span class="vocab-pill" style="animation-delay:${i*0.04}s">${esc(v)}</span>`).join('')
    : `<div class="empty-state"><span class="emoji">📭</span>Nothing added yet.</div>`;

  /* ---- Grammar ---- */
  const grammarHTML = graCount
    ? `<div class="grammar-list">${d._grammar.map((g, i) =>
        `<div class="grammar-item" style="animation-delay:${i*0.05}s">${esc(g)}</div>`
      ).join('')}</div>`
    : `<div class="empty-state"><span class="emoji">📭</span>Nothing added yet.</div>`;

  document.getElementById('app').innerHTML = `
    <div class="page-grid">

      <!-- VIDEO COLUMN -->
      <div class="video-col${vid && vid.type === 'tiktok' ? ' tiktok-col' : ''}">
        ${videoColHTML}
      </div>

      <!-- CONTENT COLUMN -->
      <div class="content-col">

        <!-- Transcript -->
        <div class="card" style="animation-delay:0s">
          <div class="card-title">📝 Transcript</div>
          <span class="date-pill">📅 ${fmtDate(d.createdAt)}</span>
          ${transcriptHTML}
        </div>

        <!-- Vocabulary -->
        <div class="card" style="animation-delay:0.07s">
          <div class="card-title yellow">📚 Vocabulary</div>
          <div class="pill-wrap">${vocabHTML}</div>
        </div>

        <!-- Grammar -->
        <div class="card" style="animation-delay:0.13s">
          <div class="card-title sky">🔤 Grammar & Structures</div>
          ${grammarHTML}
        </div>

        <!-- Audio Recordings — live recorder only -->
        <div class="card" style="animation-delay:0.19s">
          <div class="card-title green">🎙️ Audio Recordings</div>

          <!-- ═══ LIVE RECORDER ═══ -->
          <div class="recorder-section" style="border-top:none;padding-top:0;">

            <!-- Language select -->
            <div class="lang-row">
              <span style="font-family:'Quicksand',sans-serif;font-weight:700;font-size:0.8rem;color:var(--muted);">STT LANGUAGE:</span>
              <select id="liveSttLang">
                <option value="en-US" selected>🇺🇸 English (US)</option>
                <option value="en-GB">🇬🇧 English (UK)</option>
                <option value="en-AU">🇦🇺 English (AU)</option>
                <option value="vi-VN">🇻🇳 Vietnamese</option>
                <option value="zh-CN">🇨🇳 Chinese (Mandarin)</option>
                <option value="zh-TW">🇹🇼 Chinese (Traditional)</option>
                <option value="ja-JP">🇯🇵 Japanese</option>
                <option value="ko-KR">🇰🇷 Korean</option>
                <option value="fr-FR">🇫🇷 French</option>
                <option value="es-ES">🇪🇸 Spanish</option>
                <option value="de-DE">🇩🇪 German</option>
              </select>
            </div>

            <!-- Recorder controls -->
            <div class="recorder-inner">
              <div class="rec-controls">
                <div class="rec-dot" id="liveRecDot"></div>
                <div class="rec-timer" id="liveRecTimer">00:00</div>
                <button class="btn btn-red" id="liveRecBtn" onclick="toggleRecording()">● REC</button>
                <button class="btn btn-white" id="liveStopBtn" onclick="stopRecording()" disabled>■ Stop</button>
              </div>
              <!-- STT live output -->
              <div id="liveSttOutput" class="stt-box">Speech-to-text appears here while recording...</div>
            </div>

            <!-- Status -->
            <div id="liveRecStatus" class="status-msg"></div>

            <!-- Live recordings list -->
            <div id="liveRecordingsList" class="live-recordings-list" style="margin-top:10px;">
              <div style="font-family:Quicksand,sans-serif;font-size:0.85rem;color:var(--muted);padding:4px 0;">No recordings yet — hit REC to start!</div>
            </div>

          </div>
          <!-- ═══ END RECORDER ═══ -->

        </div>

      </div>
    </div>`;
}

// ── SESSION LIST ───────────────────────────────────────────────────────────
function renderList(sessions) {
  document.title = 'Sessions — Freesize English';
  const items = sessions.map(s => `
    <a class="session-list-item" href="?id=${esc(s.id)}">
      <span class="sli-id">${esc(s.id)}</span>
      <span class="sli-date">${fmtDate(s.createdAt)}</span>
      <span class="sli-arrow">→</span>
    </a>`).join('');
  document.getElementById('app').innerHTML = `
    <div class="center-wrap">
      <div class="session-list">
        <h2>📋 All Sessions</h2>
        <div class="session-list-items">${items || '<p style="color:var(--muted);font-family:Quicksand,sans-serif;">No sessions found.</p>'}</div>
      </div>
    </div>`;
}

function showLoader() {
  document.getElementById('app').innerHTML = `
    <div class="center-wrap">
      <div class="loader-spinner"></div>
      <div class="loader-text">Loading...</div>
    </div>`;
}

function showError(title, body) {
  document.getElementById('app').innerHTML = `
    <div class="center-wrap">
      <div class="error-card">
        <div class="emoji">😕</div>
        <h2>${esc(title)}</h2>
        <p>${body}</p>
      </div>
    </div>`;
}

// ── MAIN ───────────────────────────────────────────────────────────────────
async function main() {
  const id = getParam('id');
  showLoader();
  try {
    const res = await fetch('data/speaking-data.json');
    if (!res.ok) throw new Error(`HTTP ${res.status} — could not load data/speaking-data.json`);
    const json = await res.json();

    let sessions;
    if (Array.isArray(json)) {
      sessions = json;
    } else if (typeof json === 'object' && json !== null) {
      sessions = 'id' in json ? [json] : Object.values(json);
    } else {
      throw new Error('speaking-data.json must be an array or object');
    }

    if (!id) { renderList(sessions); return; }

    const session = sessions.find(s => String(s.id) === String(id));
    if (!session) throw new Error(`Session with id "${id}" not found in speaking-data.json`);

    renderPage(session);
  } catch (err) {
    showError('Could not load session', `
      <strong>Error:</strong> ${esc(err.message)}<br><br>
      Make sure <code>data/speaking-data.json</code> exists and contains an entry with <code>"id": "${esc(getParam('id') || '?')}"</code>.
    `);
  }
}

main();
</script>
